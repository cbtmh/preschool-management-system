spring.application.name=preschool-management-backend

# DATABASE CONFIGURATION (POSTGRESQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5454/preschool_db1}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE CONFIGURATION
# validate để Hibernate chỉ kiểm tra mapping, không tự tạo bảng
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# FLYWAY MIGRATION CONFIGURATION
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT CONFIGURATION
# Secret key 256-bit mã hóa Base64 (Lưu ý: Đổi key này khi lên Production)
jwt.secret=${JWT_SECRET:VGhpcy1pcy1hLWR1bW15LXNlY3JldC1rZXktMjU2LWJpdHM=}
# 30 minutes = 30 * 60 * 1000 = 1800000
jwt.expiration=1800000
jwt.refresh.expiration=1800000

# CLOUDINARY CONFIGURATION
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:dummy_cloud_name}
cloudinary.api_key=${CLOUDINARY_API_KEY:dummy_api_key}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:dummy_api_secret}

# TELEGRAM BOT CONFIGURATION
telegram.bot.token=${TELEGRAM_BOT_TOKEN:dummy_bot_token}
telegram.chat.id=${TELEGRAM_CHAT_ID:dummy_chat_id}

# MULTIPART UPLOAD CONFIGURATION (Tránh lỗi 500 do file ảnh điện thoại quá nặng)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# MAIL CONFIGURATION (GMAIL SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:dummy_email@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:dummy_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# SERVER & SECURITY CONFIGURATION
server.port=${PORT:8080}
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:*}